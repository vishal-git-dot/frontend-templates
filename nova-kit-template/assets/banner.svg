<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" role="img" aria-label="NOVA KIT — a neobrutalist link-in-bio template" width="880" height="300">
  <style>
    .bg   { fill: #0a0a0a; }
    .ink  { fill: #fafafa; }
    .lime { fill: #c6ff3a; }
    .mute { fill: #a3a3a3; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .disp { font-family: 'Space Grotesk', system-ui, sans-serif; font-weight: 700; letter-spacing: -0.04em; }

    @keyframes rise   { from { transform: translateY(18px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes draw   { from { stroke-dashoffset: 520; } to { stroke-dashoffset: 0; } }
    @keyframes blink  { 50% { opacity: 0; } }
    @keyframes scan   { 0%,100% { transform: translateY(0); } 50% { transform: translateY(216px); } }

    .t1 { animation: rise .7s cubic-bezier(.22,1,.36,1) both; }
    .t2 { animation: rise .7s cubic-bezier(.22,1,.36,1) .15s both; }
    .t3 { animation: rise .7s cubic-bezier(.22,1,.36,1) .30s both; }
    .ul { stroke: #c6ff3a; stroke-width: 8; fill: none; stroke-dasharray: 520; stroke-dashoffset: 520; animation: draw 1s ease .55s forwards; }
    .car { animation: blink 1s steps(2) infinite; }
    .scan { animation: scan 4s ease-in-out infinite; }

    @media (prefers-reduced-motion: reduce) {
      .t1, .t2, .t3, .ul, .car, .scan { animation: none !important; }
      .ul { stroke-dashoffset: 0; }
    }
  </style>

  <!-- backdrop -->
  <rect class="bg" width="880" height="300"/>

  <!-- subtle dot grid (top-left corner) -->
  <g opacity=".10" class="ink">
    <circle cx="40"  cy="40" r="1"/><circle cx="80"  cy="40" r="1"/>
    <circle cx="120" cy="40" r="1"/><circle cx="160" cy="40" r="1"/>
    <circle cx="200" cy="40" r="1"/><circle cx="240" cy="40" r="1"/>
    <circle cx="40"  cy="80" r="1"/><circle cx="80"  cy="80" r="1"/>
    <circle cx="120" cy="80" r="1"/><circle cx="160" cy="80" r="1"/>
  </g>

  <!-- version pill -->
  <rect x="36" y="36" width="148" height="28" fill="#c6ff3a"/>
  <text x="50" y="55" class="mono" font-size="14" fill="#0a0a0a">▌ v1.0 TEMPLATE</text>

  <!-- wordmark -->
  <g class="t1"><text x="40"  y="170" class="disp ink"  font-size="108">NOVA</text></g>
  <g class="t2"><text x="300" y="170" class="disp lime" font-size="108">KIT</text></g>

  <!-- accent underline -->
  <path class="ul" d="M40 188 L520 188"/>

  <!-- taglines + prompt -->
  <g class="t3">
    <text x="40" y="228" class="mono ink"  font-size="18">↳ link-in-bio · creator drops · zero-config</text>
    <text x="40" y="258" class="mono lime" font-size="16">$ bun dev _<tspan class="car">█</tspan></text>
  </g>

  <!-- mock link card (right side) -->
  <g transform="translate(640,36)">
    <!-- brutal shadow -->
    <rect x="6" y="6" width="200" height="228" fill="#c6ff3a"/>
    <!-- card -->
    <rect width="200" height="228" fill="#0a0a0a" stroke="#fafafa" stroke-width="2"/>
    <!-- NEW badge -->
    <rect x="16" y="16" width="60" height="22" fill="#c6ff3a"/>
    <text x="24" y="32" class="mono" font-size="12" fill="#0a0a0a">NEW</text>
    <!-- title -->
    <text x="16" y="74"  class="disp ink"  font-size="18">Creator</text>
    <text x="16" y="96"  class="disp ink"  font-size="18">Toolkit</text>
    <!-- meta -->
    <text x="16" y="120" class="mono mute" font-size="11">120+ assets · lifetime</text>
    <!-- CTA -->
    <rect x="16" y="164" width="168" height="44" fill="#c6ff3a"/>
    <text x="74" y="191" class="disp" font-size="15" fill="#0a0a0a">GET  →</text>
    <!-- scanning line for life -->
    <rect class="scan" x="0" y="0" width="200" height="2" fill="#c6ff3a" opacity=".35"/>
  </g>

  <!-- corner registration marks -->
  <g class="ink" opacity=".6">
    <path d="M16 16 h10 M16 16 v10" stroke="#fafafa" stroke-width="1.5" fill="none"/>
    <path d="M864 16 h-10 M864 16 v10" stroke="#fafafa" stroke-width="1.5" fill="none"/>
    <path d="M16 284 h10 M16 284 v-10" stroke="#fafafa" stroke-width="1.5" fill="none"/>
    <path d="M864 284 h-10 M864 284 v-10" stroke="#fafafa" stroke-width="1.5" fill="none"/>
  </g>
</svg>
