<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="bannerTitle">
  <title id="bannerTitle">MatchDay — Team Jerseys, Player Editions &amp; New Arrivals</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E1521"/>
      <stop offset="100%" stop-color="#16202E"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E5383B"/>
      <stop offset="100%" stop-color="#FFB703"/>
    </linearGradient>
    <clipPath id="frame">
      <rect width="900" height="260" rx="20"/>
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="900" height="260" fill="url(#bg)"/>

    <!-- floodlight sweep -->
    <g class="sweep">
      <rect x="-120" y="-80" width="240" height="440" transform="rotate(18)" fill="url(#stripe)" opacity="0.16"/>
    </g>

    <!-- decorative jersey-number watermarks -->
    <text x="14" y="80" class="watermark">07</text>
    <text x="790" y="250" class="watermark">10</text>

    <!-- wordmark -->
    <text x="58" y="118" class="title">MATCH<tspan fill="#FFB703">DAY</tspan></text>
    <rect x="60" y="134" width="0" height="6" rx="3" fill="#FFB703" class="underline"/>

    <!-- typewriter tagline (three phrases cycle) -->
    <g class="tagline">
      <text x="60" y="168" class="line phase-a">Wear The Win</text>
      <text x="60" y="168" class="line phase-b">New Drops Every Week</text>
      <text x="60" y="168" class="line phase-c">Fan&#8209;Fast Checkout On WhatsApp</text>
    </g>

    <!-- scoreboard squad-number ticker -->
    <g transform="translate(706,36)">
      <rect width="146" height="54" rx="10" fill="#0E1521" stroke="#FFB703" stroke-width="1.5"/>
      <text x="73" y="22" text-anchor="middle" class="ticker-label">SQUAD NO.</text>
      <g class="ticker-num">
        <text x="73" y="46" text-anchor="middle" class="num num-a">07</text>
        <text x="73" y="46" text-anchor="middle" class="num num-b">23</text>
        <text x="73" y="46" text-anchor="middle" class="num num-c">10</text>
      </g>
    </g>
  </g>

  <style>
    .watermark{
      font-family:'Arial Black','Helvetica Neue',Arial,sans-serif;
      font-size:120px; font-weight:900; fill:#FFFFFF; opacity:0.05;
    }
    /* Base styles below are the graceful no-animation fallback:
       title shown, underline fully drawn, first phrase/number visible. */
    .title{
      font-family:'Arial Black','Helvetica Neue',Arial,sans-serif;
      font-size:52px; font-weight:900; fill:#FFFFFF; letter-spacing:1px;
      transform-origin:60px 118px;
      animation: rise .6s ease-out .15s forwards;
    }
    .underline{ width:268px; animation: draw .5s ease-out .75s forwards; }

    .tagline .line{
      font-family:'Helvetica Neue',Arial,sans-serif;
      font-size:18px; font-weight:600; fill:rgba(255,255,255,0.85);
    }
    .phase-a{ opacity:1; animation: cycle 9s ease-in-out 0s infinite; }
    .phase-b{ opacity:0; animation: cycle 9s ease-in-out 3s infinite; }
    .phase-c{ opacity:0; animation: cycle 9s ease-in-out 6s infinite; }

    .ticker-label{
      font-family:'Courier New',monospace; font-size:10px; font-weight:700;
      fill:rgba(255,255,255,0.55); letter-spacing:1.5px;
    }
    .num{
      font-family:'Courier New',monospace; font-size:24px; font-weight:700; fill:#FFB703;
    }
    .num-a{ opacity:1; animation: tick 6s ease-in-out 0s infinite; }
    .num-b{ opacity:0; animation: tick 6s ease-in-out 2s infinite; }
    .num-c{ opacity:0; animation: tick 6s ease-in-out 4s infinite; }

    .sweep{ animation: drift 7s ease-in-out infinite; }

    @keyframes rise{
      from{ opacity:0; transform:translateY(14px); }
      to{ opacity:1; transform:translateY(0); }
    }
    @keyframes draw{ from{ width:0; } to{ width:268px; } }
    @keyframes drift{
      0%{ transform:translateX(-30px); }
      50%{ transform:translateX(30px); }
      100%{ transform:translateX(-30px); }
    }
    /* each phrase/number owns roughly the first third of its cycle */
    @keyframes cycle{
      0%{ opacity:0; }
      4%{ opacity:1; }
      28%{ opacity:1; }
      33%{ opacity:0; }
      100%{ opacity:0; }
    }
    @keyframes tick{
      0%{ opacity:0; }
      5%{ opacity:1; }
      28%{ opacity:1; }
      33%{ opacity:0; }
      100%{ opacity:0; }
    }

    @media (prefers-reduced-motion: reduce){
      .title{ animation:none; opacity:1; transform:none; }
      .underline{ animation:none; width:268px; }
      .phase-a, .num-a{ animation:none; opacity:1; }
      .phase-b, .phase-c, .num-b, .num-c{ animation:none; opacity:0; }
      .sweep{ animation:none; }
    }
  </style>
</svg>
